<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/global.css">
    <link rel="shortcut icon" href="assets/img/favicon-32x32.png" type="image/x-icon" />
    <title>Jogo da Velha</title>
</head>
<body>
    <main>
    <section class="main__container" id="menu">
        <img src="assets/img/logo.svg" alt="Símbolos do jogo da velha, X e O." class="logo">
        <div class="newgame__container">
            <p class="newgame__title">Escolha o símbolo do Jogador 1</p>
            <div class="newgame__buttons">
                <button type="button" class="button-x" id="button-x-or-o" data-btn="x"><img src="assets/img/icon-x-claro.svg" alt="X" data-btn="x"></button>
                <button type="button" class="button-o" id="button-x-or-o" data-btn="o"><img src="assets/img/icon-o-escuro.svg" alt="O" data-btn="o"></button>
            </div>
            <p class="newgame__obs">Lembre-se: o X jogará primeiro</p>
        </div>
        <button type="button" class="button-computer" data-play="pvc">Jogue contra o computador</button>
        <button type="button" class="button-multiplayer" data-play="pvp">Jogue com um amigo</button>
    </section>  
    <section class="game__container" id="start-game">
        <img src="assets/img/logo.svg" alt="Símbolos do jogo da velha, X e O." class="game__logo">
        <div class="game__turn" id="game-turn"><p>Vez do Jogador X</p></div>
        <button type="button" class="game__restart" id="button-restart"><img src="assets/img/icon-restart.svg" alt="Símbolo de uma setinha retornando"></button>
        <div class="celula-jogo" data-celula="0"></div>
        <div class="celula-jogo" data-celula="1"></div>
        <div class="celula-jogo" data-celula="2"></div>
        <div class="celula-jogo" data-celula="3"></div>
        <div class="celula-jogo" data-celula="4"></div>
        <div class="celula-jogo" data-celula="5"></div>
        <div class="celula-jogo" data-celula="6"></div>
        <div class="celula-jogo" data-celula="7"></div>
        <div class="celula-jogo" data-celula="8"></div>
        <div class="game__results result-x">
            <p class="game__player" id="player-x">X</p>
            <p class="result" id="resultX">0</p>
        </div>
        <div class="game__results result-tie">
            <p class="game__player">Empate</p>
            <p class="result" id="resultTie">0</p>
        </div>
        <div class="game__results result-o">
            <p class="game__player" id="player-o">O</p>
            <p class="result" id="resultO">0</p>
        </div>
    </section>
    <dialog id="dialog"></dialog>     
    </main> 
    <script src="assets/js/script.js"></script>
</body>
</html>
